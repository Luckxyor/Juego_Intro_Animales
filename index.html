<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מִי אֲנִי?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-wrapper">

    <header>
        <h1>מִי אֲנִי?</h1>
      <div class="score-bar">
        <span id="score-text">0 / 14</span>
      </div>
    </header>

    <div class="carousel-container">

      <button class="nav-btn prev-btn" id="prevBtn" aria-label="Anterior">&#8249;</button>

      <div class="carousel-viewport">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>

      <button class="nav-btn next-btn" id="nextBtn" aria-label="Siguiente">&#8250;</button>

    </div>

    <div class="dots-container" id="dotsContainer"></div>

    <div class="reset-area">
      <button class="reset-btn" id="resetBtn">🔄 Reiniciar</button>
    </div>

  </div>

  <div class="confetti-container" id="confettiContainer"></div>



  <script src="script.js"></script>
</body>
</html>
